name: agent-loop-guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install agent-loop-guard
        run: npm install
        working-directory: .

      - name: Build agent-loop-guard
        run: npm run build
        working-directory: .

      - name: Determine diff range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.after }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan diff for suspicious patterns
        run: node ci/scan-diff.mjs "${{ steps.range.outputs.base }}" "${{ steps.range.outputs.head }}"
